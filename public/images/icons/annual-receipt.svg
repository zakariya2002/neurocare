<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="350" height="350">
  <defs>
    <radialGradient id="ar-bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ecfeff"/>
      <stop offset="100%" stop-color="#a5f3fc"/>
    </radialGradient>
    <linearGradient id="ar-paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e6f4f4"/>
    </linearGradient>
    <linearGradient id="ar-header" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a9e9e"/>
      <stop offset="100%" stop-color="#027e7e"/>
    </linearGradient>
    <linearGradient id="ar-coin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="50%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="ar-coin-edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <filter id="ar-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.2"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Halo pastel -->
  <circle cx="128" cy="128" r="120" fill="url(#ar-bg)"/>

  <!-- Document -->
  <g filter="url(#ar-shadow)">
    <!-- Feuille avec bord dentelé en bas -->
    <path d="M 64 48
             L 192 48
             Q 200 48 200 56
             L 200 200
             L 192 196
             L 184 200
             L 176 196
             L 168 200
             L 160 196
             L 152 200
             L 144 196
             L 136 200
             L 128 196
             L 120 200
             L 112 196
             L 104 200
             L 96 196
             L 88 200
             L 80 196
             L 72 200
             L 64 196
             L 56 200
             L 56 56
             Q 56 48 64 48 Z"
          fill="url(#ar-paper)" stroke="#a5f3fc" stroke-width="1.5"/>

    <!-- En-tête teal -->
    <path d="M 64 48
             L 192 48
             Q 200 48 200 56
             L 200 84
             L 56 84
             L 56 56
             Q 56 48 64 48 Z"
          fill="url(#ar-header)"/>

    <!-- Année dans en-tête -->
    <text x="128" y="73" text-anchor="middle" font-family="Verdana, sans-serif" font-size="20" font-weight="700" fill="#ffffff">2026</text>

    <!-- Lignes de chiffres -->
    <rect x="68" y="98" width="64" height="4" rx="2" fill="#3a9e9e" opacity="0.5"/>
    <rect x="156" y="98" width="32" height="4" rx="2" fill="#027e7e"/>

    <rect x="68" y="114" width="58" height="4" rx="2" fill="#3a9e9e" opacity="0.5"/>
    <rect x="158" y="114" width="30" height="4" rx="2" fill="#027e7e"/>

    <rect x="68" y="130" width="70" height="4" rx="2" fill="#3a9e9e" opacity="0.5"/>
    <rect x="156" y="130" width="32" height="4" rx="2" fill="#027e7e"/>

    <rect x="68" y="146" width="60" height="4" rx="2" fill="#3a9e9e" opacity="0.5"/>
    <rect x="158" y="146" width="30" height="4" rx="2" fill="#027e7e"/>

    <!-- Ligne de séparation total -->
    <line x1="68" y1="166" x2="188" y2="166" stroke="#027e7e" stroke-width="1.5" stroke-dasharray="3 2"/>

    <!-- Total -->
    <rect x="68" y="174" width="40" height="6" rx="3" fill="#027e7e"/>
    <rect x="148" y="174" width="40" height="6" rx="3" fill="#027e7e"/>
  </g>

  <!-- Pièce euro -->
  <g filter="url(#ar-shadow)" transform="translate(196 168)">
    <circle r="32" fill="url(#ar-coin-edge)"/>
    <circle r="28" fill="url(#ar-coin)"/>
    <circle r="28" fill="none" stroke="#92400e" stroke-width="1" opacity="0.4"/>
    <text y="10" text-anchor="middle" font-family="Verdana, sans-serif" font-size="36" font-weight="700" fill="#92400e">€</text>
    <ellipse cx="-8" cy="-12" rx="10" ry="6" fill="#ffffff" opacity="0.5"/>
  </g>
</svg>
