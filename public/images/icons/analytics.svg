<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 262 262" width="350" height="350">
  <defs>
    <clipPath id="a-circle">
      <circle cx="131" cy="131" r="131"/>
    </clipPath>
    <linearGradient id="a-bar1" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="a-bar2" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f0879f"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="a-bar3" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7e22ce"/>
    </linearGradient>
  </defs>

  <!-- Background circle (lavender pastel like other icons) -->
  <g clip-path="url(#a-circle)">
    <rect width="262" height="262" fill="#f3e8ff"/>
    <!-- Subtle dot decoration -->
    <circle cx="42" cy="46" r="4" fill="#ddd6fe" opacity="0.6"/>
    <circle cx="218" cy="60" r="5" fill="#ddd6fe" opacity="0.5"/>
    <circle cx="38" cy="220" r="6" fill="#ddd6fe" opacity="0.5"/>
    <circle cx="225" cy="215" r="3" fill="#ddd6fe" opacity="0.7"/>
  </g>

  <!-- Floor / shadow line -->
  <rect x="56" y="186" width="150" height="3" rx="1.5" fill="#c4b5fd" opacity="0.4"/>

  <!-- Bar 1 (small) -->
  <rect x="68" y="142" width="32" height="44" rx="6" fill="url(#a-bar1)"/>
  <rect x="68" y="142" width="32" height="6" rx="3" fill="#bae6fd" opacity="0.7"/>

  <!-- Bar 2 (medium) -->
  <rect x="115" y="108" width="32" height="78" rx="6" fill="url(#a-bar2)"/>
  <rect x="115" y="108" width="32" height="6" rx="3" fill="#fbcfe8" opacity="0.7"/>

  <!-- Bar 3 (tall - growth) -->
  <rect x="162" y="78" width="32" height="108" rx="6" fill="url(#a-bar3)"/>
  <rect x="162" y="78" width="32" height="6" rx="3" fill="#e9d5ff" opacity="0.7"/>

  <!-- Trending up arrow -->
  <g stroke="#10b981" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <polyline points="76,108 130,76 178,52"/>
  </g>
  <!-- Arrow head -->
  <path d="M 178 52 L 168 50 M 178 52 L 178 62" stroke="#10b981" stroke-width="5" stroke-linecap="round" fill="none"/>

  <!-- Sparkle / decoration -->
  <g fill="#fcd34d">
    <circle cx="200" cy="42" r="3"/>
    <circle cx="55" cy="80" r="2.5"/>
  </g>
</svg>
