<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="350" height="350">
  <defs>
    <radialGradient id="rm-bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#fef2f2"/>
      <stop offset="100%" stop-color="#fecaca"/>
    </radialGradient>
    <linearGradient id="rm-bell" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="rm-bell-light" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fed7aa"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <radialGradient id="rm-dot" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fca5a5"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </radialGradient>
    <filter id="rm-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.2"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Halo pastel -->
  <circle cx="128" cy="128" r="120" fill="url(#rm-bg)"/>

  <!-- Cloche -->
  <g filter="url(#rm-shadow)">
    <!-- Pommeau -->
    <circle cx="128" cy="62" r="10" fill="#c2410c"/>
    <circle cx="128" cy="62" r="6" fill="#fb923c"/>

    <!-- Corps de la cloche -->
    <path d="M128 76
             C 92 76 76 102 76 132
             L 76 168
             L 60 184
             L 60 192
             L 196 192
             L 196 184
             L 180 168
             L 180 132
             C 180 102 164 76 128 76 Z"
          fill="url(#rm-bell)"/>

    <!-- Reflet -->
    <path d="M100 100
             C 92 116 88 138 90 156
             L 96 156
             C 94 138 98 118 104 104 Z"
          fill="url(#rm-bell-light)" opacity="0.55"/>

    <!-- Battant -->
    <ellipse cx="128" cy="208" rx="16" ry="10" fill="#9a3412"/>
    <ellipse cx="128" cy="206" rx="14" ry="8" fill="#c2410c"/>
  </g>

  <!-- Pastille notification -->
  <g filter="url(#rm-shadow)">
    <circle cx="186" cy="78" r="22" fill="url(#rm-dot)"/>
    <circle cx="180" cy="72" r="6" fill="#ffffff" opacity="0.45"/>
    <text x="186" y="86" text-anchor="middle" font-family="Verdana, sans-serif" font-size="22" font-weight="700" fill="#ffffff">!</text>
  </g>

  <!-- Ondes sonores -->
  <g stroke="#fb923c" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.6">
    <path d="M44 122 q -8 8 0 24"/>
    <path d="M32 110 q -16 16 0 48"/>
    <path d="M212 122 q 8 8 0 24"/>
    <path d="M224 110 q 16 16 0 48"/>
  </g>
</svg>
